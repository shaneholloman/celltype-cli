name: design.proteinmpnn
display_name: ProteinMPNN
description: Design amino acid sequences for protein backbones using ProteinMPNN (GPU).
category: design
usage_guide: Use after backbone design (RFDiffusion) to generate amino acid sequences. Lightweight GPU tool (~1GB VRAM).
docker_image: celltype/proteinmpnn:latest
parameters:
  backbone_pdb: Protein backbone PDB string
  num_sequences: 'Number of sequences to design (default: 10)'
compute:
  requires_gpu: true
  min_vram_gb: 32
  gpu_profile: docking
  estimated_cost_usd: 0.03
  gpu_type: T4
modal_function: design_proteinmpnn
execution:
  timeout_s: 300
