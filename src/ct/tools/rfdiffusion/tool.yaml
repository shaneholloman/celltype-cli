name: design.rfdiffusion
display_name: RFDiffusion
description: Design novel protein backbones using RFDiffusion (GPU). Generates backbone structures that bind a target.
category: design
usage_guide: Use to design novel protein binders for a target. 2GB VRAM for small proteins, 8GB for >200 residues.
docker_image: celltype/rfdiffusion:latest
parameters:
  pdb_text: Inline target protein structure as PDB text
  target_pdb: Local path to a target protein structure file (.pdb, .cif, .mmcif, .ent)
  mode: Design mode. Use `monomer` for unconditional backbone generation or `binder` for hotspot-guided binder design
  num_designs: 'Number of backbone designs (default: 5)'
  receptor_chain: Required in `binder` mode. Single receptor chain ID present in `target_pdb`
  binder_length: Required in `binder` mode. Length of the designed binder chain
  hotspot_residues: Required in `binder` mode. Comma-separated canonical receptor residues like `A54,A57,A61`
compute:
  requires_gpu: true
  min_vram_gb: 32
  gpu_profile: structure
  estimated_cost_usd: 0.1
  gpu_type: A10G
modal_function: design_rfdiffusion
execution:
  timeout_s: 300
