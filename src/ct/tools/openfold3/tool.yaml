name: structure.openfold3
display_name: OpenFold3
description: Predict biomolecular complex structures with an OpenFold3-compatible multimolecule request payload (GPU).
category: structure
usage_guide: 'Use for OpenFold3-style multimolecule structure prediction across proteins, nucleic acids, and ligands.'
docker_image: celltype/openfold3:latest
parameters:
  type: object
  additionalProperties: false
  required:
    - request_id
    - inputs
  properties:
    request_id:
      type: string
      description: Top-level request identifier.
    inputs:
      type: array
      description: One or more OpenFold3 prediction inputs.
      minItems: 1
      items:
        type: object
        additionalProperties: false
        required:
          - input_id
          - molecules
        properties:
          input_id:
            type: string
            description: Input identifier unique within the request.
          molecules:
            type: array
            minItems: 1
            items:
              type: object
              additionalProperties: false
              required:
                - type
                - id
              properties:
                type:
                  type: string
                  enum: [protein, dna, rna, ligand]
                id:
                  type: string
                  description: Molecule or chain identifier.
                sequence:
                  type: string
                  description: Sequence for protein, DNA, or RNA molecules.
                msa:
                  type: object
                  description: Optional MSA payload for protein or RNA molecules.
                  additionalProperties:
                    type: object
                    additionalProperties: false
                    properties:
                      csv:
                        type: object
                        additionalProperties: false
                        required:
                          - alignment
                          - format
                        properties:
                          alignment:
                            type: string
                          format:
                            type: string
                            enum: [csv]
                      a3m:
                        type: object
                        additionalProperties: false
                        required:
                          - alignment
                          - format
                        properties:
                          alignment:
                            type: string
                          format:
                            type: string
                            enum: [a3m]
                ccd_code:
                  type: string
                  description: CCD identifier for ligand molecules.
                smiles:
                  type: string
                  description: SMILES string for ligand molecules.
          output_format:
            type: string
            enum: [pdb, mmcif]
            description: Structure output format.
compute:
  requires_gpu: true
  min_vram_gb: 32
  gpu_profile: structure
  estimated_cost_usd: 0.25
  gpu_type: A100
modal_function: predict_structure_openfold3
execution:
  timeout_s: 900
