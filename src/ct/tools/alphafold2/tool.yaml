name: structure.alphafold2
display_name: AlphaFold2
description: Predict protein structure from a single sequence with AlphaFold2-compatible search controls (GPU).
category: structure
usage_guide: 'Use for AlphaFold2-compatible single-chain prediction. Supports NIM-like database, e-value, algorithm, and relaxation controls.'
docker_image: celltype/alphafold2:latest
parameters:
  type: object
  additionalProperties: false
  required:
    - sequence
  properties:
    sequence:
      type: string
      description: Single protein amino acid sequence.
    databases:
      type: array
      description: Databases to query while building the MSA.
      items:
        type: string
        enum: [small_bfd, uniref90, mgnify, uniprot]
      minItems: 1
    e_value:
      type: number
      description: E-value threshold used during MSA search.
      minimum: 0
    algorithm:
      type: string
      description: Alignment search algorithm.
      enum: [mmseqs2, jackhmmer]
    relax_prediction:
      type: boolean
      description: Whether to run the relaxation step after structure prediction.
compute:
  requires_gpu: true
  min_vram_gb: 32
  gpu_profile: structure
  estimated_cost_usd: 0.1
  gpu_type: A100
modal_function: predict_structure_alphafold2
execution:
  timeout_s: 600
